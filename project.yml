name: CreatorNote
options:
  bundleIdPrefix: com.soohoon
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  CreatorNote:
    type: application
    platform: iOS
    sources:
      - CreatorNote
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        INFOPLIST_FILE: CreatorNote/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.soohoon.CreatorNote
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: minimal
        DEVELOPMENT_TEAM: "XH7F9CHU48"
        CODE_SIGN_ENTITLEMENTS: CreatorNote/Resources/CreatorNote.entitlements

  CreatorNoteUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - CreatorNoteUITests
    dependencies:
      - target: CreatorNote
    settings:
      base:
        DEVELOPMENT_TEAM: "XH7F9CHU48"
